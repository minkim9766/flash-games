<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 800px; height: 600px; display: block; }
    </style>
    <!-- 가장 안전한 cdnjs 경로에서 스크립트 빌려오기 -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // 1. 주소창에서 ?game= 값 미리 읽어두기
        const urlParams = new URLSearchParams(window.location.search);
        const gameName = urlParams.get('game') || "default-game"; 

        // 2. 파일이 저장된 본인의 기본 폴더 주소 (끝에 슬래시 / 필수)
        const baseFolderUrl = "https://xn--ob0bq71akxcvza77rtjatg1a116a8s7a.com";
        const fullSwfUrl = baseFolderUrl + gameName + ".swf";

        // 3. window.RufflePlayer 자바스크립트 호출 에러를 완벽히 피하는 우회 공식
        // 브라우저에 <ruffle-player> 라는 태그 기능이 정의 완료되는 순간을 감지합니다.
        customElements.whenDefined('ruffle-player').then(() => {
            const container = document.getElementById("game-container");
            
            // HTML 태그 형태로 엘리먼트를 직접 생성 (자바스크립트 내부 객체 에러 원천 차단)
            const player = document.createElement('ruffle-player');
            container.appendChild(player);

            // 주소 및 세팅 주입
            player.load({
                url: fullSwfUrl,
                allowScriptAccess: true
            });
        });
    </script>

</body>
</html>
