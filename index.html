<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 800px; height: 600px; display: block; }
    </style>
    <!-- 구글 샌드박스를 우회하는 안정적인 Ruffle 엔진 로드 -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // 1. 주소창의 ?game= 값에서 파일 이름 추출
        const urlParams = new URLSearchParams(window.location.search);
        const gameName = urlParams.get('game');

        // ?game= 값이 없을 때 기본으로 켜질 SWF 파일 이름 (원하는 파일명으로 수정 가능)
        const defaultGame = "temple-of-boom"; 
        const finalGameName = gameName ? gameName : defaultGame;

        // 2. 같은 디렉토리이므로 복잡한 URL 없이 파일명만 조립
        const fullSwfPath = finalGameName + ".swf";

        // 3. 타이밍 에러를 방지하는 안전한 구동부
        customElements.whenDefined('ruffle-player').then(() => {
            const container = document.getElementById("game-container");
            const player = document.createElement('ruffle-player');
            container.appendChild(player);

            player.load({
                url: fullSwfPath,
                allowScriptAccess: true
            });
        });
    </script>

</body>
</html>
