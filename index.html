<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SWF Game Player</title>

<script src="ruffle.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#player {
    width: 100%;
    height: 100%;
}
</style>

</head>

<body>

<div id="player"></div>

<script>
(function () {

    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    if (!game) {
        document.getElementById("player").innerHTML =
            "게임이 지정되지 않았습니다.<br>예: index.html?game=game1";
        return;
    }

    const swf = game + ".swf";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("player").appendChild(player);

    player.load({
        url: swf
    });

})();
</script>

</body>
</html>
